name: Daily Task Notification

on:
  schedule:
    # 每天北京时间 01:00 (对应 UTC 17:00 前一天)
    - cron: '0 17 * * *'
    # 每天北京时间 07:30 (对应 UTC 23:30 前一天)
    - cron: '30 23 * * *'
    # 每天北京时间 14:00 (对应 UTC 06:00)
    - cron: '0 6 * * *'
    # 每天北京时间 20:30 (对应 UTC 12:30)
    - cron: '30 12 * * *'
  workflow_dispatch: # 手动触发开关

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run notification script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WEBHOOK_ZHANG: ${{ secrets.WEBHOOK_ZHANG }}
          WEBHOOK_FLORA: ${{ secrets.WEBHOOK_FLORA }}
          WEBHOOK_TING: ${{ secrets.WEBHOOK_TING }}
          WEBHOOK_VIVIAN: ${{ secrets.WEBHOOK_VIVIAN }}
          WEBHOOK_MAO: ${{ secrets.WEBHOOK_MAO }}
        run: python bot.py
