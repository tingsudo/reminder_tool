name: Daily Task Notification

on:
schedule:
    # 每天北京时间 07:30 (UTC 23:30 前一天)
    - cron: '30 23 * * *'
    # 每天北京时间 12:00 (UTC 04:00)
    - cron: '0 4 * * *'
    # 每天北京时间 20:30 (UTC 12:30)
    - cron: '30 12 * * *'
  workflow_dispatch: # 允许你随时在 GitHub 界面手动点击 "Run workflow" 测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run notification script
        env:
          # 数据库配置
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
          # 5 位老师的专属 Webhook 映射
          WEBHOOK_ZHANG: ${{ secrets.WEBHOOK_ZHANG }}
          WEBHOOK_FLORA: ${{ secrets.WEBHOOK_FLORA }}
          WEBHOOK_TING: ${{ secrets.WEBHOOK_TING }}
          WEBHOOK_VIVIAN: ${{ secrets.WEBHOOK_VIVIAN }}
          WEBHOOK_MAO: ${{ secrets.WEBHOOK_MAO }}
        run: python bot.py
